    <style>
        :root {
            --neon-green: #ccff00;
            --dark-bg: #050505;
            --panel-bg: rgba(20, 20, 20, 0.6);
        }
        
        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Space Mono', monospace;
            overflow: hidden;
        }

        .font-syne {
            font-family: 'Syne', sans-serif;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #111;
        }
        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--neon-green);
        }

        /* Animations */
        @keyframes liquid {
            0% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(10px, 15px) rotate(5deg); }
            50% { transform: translate(0, 20px) rotate(0deg); }
            75% { transform: translate(-10px, 15px) rotate(-5deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }

        .solar-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            background: radial-gradient(circle at 50% 50%, #0a1a0a 0%, #000000 100%);
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.4;
            animation: liquid 20s infinite ease-in-out;
        }

        .orb-1 {
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(204,255,0,0.15) 0%, transparent 70%);
            top: -100px;
            left: -100px;
            animation-duration: 25s;
        }

        .orb-2 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(204,255,0,0.1) 0%, transparent 70%);
            bottom: -50px;
            right: -50px;
            animation-duration: 30s;
            animation-delay: -5s;
        }

        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
            pointer-events: none;
        }

        .glass-panel {
            background: rgba(20, 20, 20, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .btn-brutal {
            border: 1px solid var(--neon-green);
            background: transparent;
            color: var(--neon-green);
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        .btn-brutal:hover {
            background: var(--neon-green);
            color: black;
            box-shadow: 0 0 15px rgba(204, 255, 0, 0.4);
        }

        .btn-brutal:active {
            transform: scale(0.98);
        }

        .spin-slow {
            animation: spin 8s linear infinite;
        }
        
        .spin-paused {
            animation-play-state: paused;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .visualizer-bar {
            width: 4px;
            background: var(--neon-green);
            height: 100%;
            animation: visualize 0.5s ease-in-out infinite alternate;
        }

        @keyframes visualize {
            0% { height: 10%; }
            100% { height: 100%; }
        }
        
        .marquee-container {
            overflow: hidden;
            white-space: nowrap;
        }
        
        .marquee-content {
            display: inline-block;
            animation: marquee 15s linear infinite;
        }
        
        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
    </style>
</head>
<body class="h-screen flex flex-col">

            { title: "Cartel feat. Meryl", artist: "Timal", url: "https://raw.githubusercontent.com/oscarmonteur/spotifree/main/Timal%20-%20Cartel%20feat.%20Meryl%20(Clip%20Officiel).mp3", cover: "./timal.png", project: "Timal" },
            { title: "Cavaler", artist: "Timal", url: "https://raw.githubusercontent.com/oscarmonteur/spotifree/main/Timal%20-%20Cavaler%20(Clip%20Officiel).mp3", cover: "./timal.png", project: "Timal" },
            { title: "Copilote", artist: "Timal", url: "https://raw.githubusercontent.com/oscarmonteur/spotifree/main/Timal%20-%20Copilote%20(Clip%20Officiel).mp3", cover: "./timal.png", project: "Timal" },
            { title: "Dans la ville", artist: "Timal", url: "https://raw.githubusercontent.com/oscarmonteur/spotifree/main/Timal%20-%20Dans%20la%20ville%20(Clip%20Officiel).mp3", cover: "./timal.png", project: "Timal" },
            { title: "La 8 (Chivas)", artist: "Timal", url: "https://raw.githubusercontent.com/oscarmonteur/spotifree/main/Timal%20-%20La%208%20(Chivas)%20(Clip%20Officiel).mp3", cover: "./timal.png", project: "Timal" },
            { title: "Maria", artist: "Timal", url: "https://raw.githubusercontent.com/oscarmonteur/spotifree/main/Timal%20-%20Maria%20(Clip%20Officiel).mp3", cover: "./timal.png", project: "Timal" },
            { title: "RR Phantom", artist: "Timal", url: "https://raw.githubusercontent.com/oscarmonteur/spotifree/main/Timal%20-%20RR%20Phantom%20(Clip%20Officiel).mp3", cover: "./timal.png", project: "Timal" },
            { title: "10 ans d'âge", artist: "Timal", url: "https://raw.githubusercontent.com/oscarmonteur/spotifree/main/Timal%20x%20Leto%20x%20Gradur%20-%2010%20ans%20da%CC%82ge%20(Clip%20Officiel).mp3", cover: "./timal.png", project: "Timal" },
            { title: "Filtré", artist: "Timal", url: "https://raw.githubusercontent.com/oscarmonteur/spotifree/main/Timal%2C%20Gazo%20-%20Filtre%CC%81%20(Clip%20Officiel).mp3", cover: "./timal.png", project: "Timal" },

            // Édits / Others
            { title: "BABEL (Emre Kabak Remix)", artist: "Édits", url: "https://raw.githubusercontent.com/oscarmonteur/spotifree/main/BABEL%20(%20Emre%20Kabak%20Remix)%20%7C%20CAR%20VIDEO.mp3", cover: "./edit.png", project: "Édits" },
            { title: "Dark Angel (Super Slowed)", artist: "Édits", url: "https://raw.githubusercontent.com/oscarmonteur/spotifree/main/Dark%20angel%20(super%20slowed)-2.mp3", cover: "./edit.png", project: "Édits" },
            { title: "FUNK UNIVERSO (Slowed)", artist: "Édits", url: "https://raw.githubusercontent.com/oscarmonteur/spotifree/main/FUNK%20UNIVERSO%20(Slowed).mp3", cover: "./edit.png", project: "Édits" },
            { title: "From the Shadows (Super Slowed)", artist: "Édits", url: "https://raw.githubusercontent.com/oscarmonteur/spotifree/main/From%20the%20Shadows%20(Super%20Slowed).mp3", cover: "./edit.png", project: "Édits" },
            { title: "No Man No Cry (Live)", artist: "Jimmy Sax", url: "https://raw.githubusercontent.com/oscarmonteur/spotifree/main/Jimmy%20Sax%20-%20No%20Man%20No%20Cry%20%20(live).mp3", cover: "./edit.png", project: "Édits" },
            { title: "AVANGARD (Slowed + Reverb)", artist: "LONOWN", url: "https://raw.githubusercontent.com/oscarmonteur/spotifree/main/LONOWN%20-%20AVANGARD%20(Slowed%20%2B%20Reverb).mp3", cover: "./edit.png", project: "Édits" },
            { title: "Manasha (Over Slowed)", artist: "Édits", url: "https://raw.githubusercontent.com/oscarmonteur/spotifree/main/Manasha%20(Over%20Slowed).mp3", cover: "./edit.png", project: "Édits" },
            { title: "Vois Sur Ton Chemin (Ultrafunk)", artist: "Édits", url: "https://raw.githubusercontent.com/oscarmonteur/spotifree/main/VOIS%20SUR%20TON%20CHEMIN%20(ULTRAFUNK%20SLOWED).mp3", cover: "./edit.png", project: "Édits" },
            { title: "War Song (Slowed)", artist: "Édits", url: "https://raw.githubusercontent.com/oscarmonteur/spotifree/main/War%20Song%20%5BSlowed%20To%20Perfection%5D%20%7C%20Motivational%20Music.mp3", cover: "./edit.png", project: "Édits" },
            { title: "28 Days Later (Slowed)", artist: "deprezz", url: "https://raw.githubusercontent.com/oscarmonteur/spotifree/main/deprezz%20-%2028%20Days%20Later%20(Slowed)%20(In%20The%20house%2C%20In%20a%20Heartbeat).mp3", cover: "./edit.png", project: "Édits" },
            { title: "Vois Sur Ton Chemin", artist: "deprezz", url: "https://raw.githubusercontent.com/oscarmonteur/spotifree/main/deprezz%20-%20Vois%20Sur%20Ton%20Chemin.mp3", cover: "./edit.png", project: "Édits" }
        ];

        let currentPlaylist = [...allTracks]; // Default to all
        let currentTrackIndex = 0;
        let isPlaying = false;
        let likedSongs = JSON.parse(localStorage.getItem('likedSongs')) || [];

        // DOM Elements
        const audioPlayer = document.getElementById('audio-player');
        const playPauseBtn = document.getElementById('play-pause-btn');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const progressBar = document.getElementById('progress-bar');
        const progressContainer = document.getElementById('progress-container');
        const trackList = document.getElementById('track-list');
        const trackCount = document.getElementById('track-count');
        const headerTitle = document.getElementById('header-title');
        const headerSubtitle = document.getElementById('header-subtitle');
        const headerImage = document.getElementById('header-image');
        
        const currentTitle = document.getElementById('current-title');
        const currentArtist = document.getElementById('current-artist');
        const currentArt = document.getElementById('current-art');
        const marqueeContent = document.querySelector('.marquee-content');

        // Initialize
        function init() {
            // Default view: Édit Playlist
            filterByProject('Édits');
            
            // Event Listeners
            playPauseBtn.addEventListener('click', togglePlay);
            prevBtn.addEventListener('click', prevTrack);
            nextBtn.addEventListener('click', nextTrack);
            audioPlayer.addEventListener('timeupdate', updateProgress);
            audioPlayer.addEventListener('ended', nextTrack);
            progressContainer.addEventListener('click', setProgress);
        }

        function loadTrack(index) {
            if (currentPlaylist.length === 0) return;
            const track = currentPlaylist[index];
            audioPlayer.src = track.url;
            currentTitle.textContent = track.title;
            currentArtist.textContent = track.artist;
            
            // Handle cover art error
            const img = new Image();
            img.src = track.cover;
            img.onload = () => currentArt.src = track.cover;
            img.onerror = () => currentArt.src = 'https://picsum.photos/seed/edit/100';
            
            // Update marquee text
            const spans = marqueeContent.querySelectorAll('span');
            spans.forEach(span => span.textContent = track.title);

            updateActiveTrackStyle();
            updateLikeButtonState(); // Ensure this function exists or remove call if not implemented
        }

        function playTrack() {
            audioPlayer.play().catch(e => console.log("Audio play failed:", e));
            isPlaying = true;
            playPauseBtn.innerHTML = '<i class="fas fa-pause text-xl"></i>';
            currentArt.classList.remove('spin-paused');
            currentArt.classList.add('spin-slow');
            
            // Update visualizer
            document.querySelectorAll('.visualizer-bar').forEach(bar => {
                bar.style.animationPlayState = 'running';
            });
        }

        function pauseTrack() {
            audioPlayer.pause();
            isPlaying = false;
            playPauseBtn.innerHTML = '<i class="fas fa-play text-xl ml-1"></i>';
            currentArt.classList.add('spin-paused');
            
            // Pause visualizer
            document.querySelectorAll('.visualizer-bar').forEach(bar => {
                bar.style.animationPlayState = 'paused';
            });
        }

        function togglePlay() {
            if (isPlaying) pauseTrack();
            else playTrack();
        }

        function nextTrack() {
            currentTrackIndex = (currentTrackIndex + 1) % currentPlaylist.length;
            loadTrack(currentTrackIndex);
            playTrack();
        }

        function prevTrack() {
            currentTrackIndex = (currentTrackIndex - 1 + currentPlaylist.length) % currentPlaylist.length;
            loadTrack(currentTrackIndex);
            playTrack();
        }

        function updateProgress(e) {
            const { duration, currentTime } = e.srcElement;
            const progressPercent = (currentTime / duration) * 100;
            progressBar.style.width = `${progressPercent}%`;
        }

        function setProgress(e) {
            const width = this.clientWidth;
            const clickX = e.offsetX;
            const duration = audioPlayer.duration;
            audioPlayer.currentTime = (clickX / width) * duration;
        }

        function selectTrack(index) {
            currentTrackIndex = index;
            loadTrack(currentTrackIndex);
            playTrack();
        }

        function updateActiveTrackStyle() {
            const items = document.querySelectorAll('.track-item');
            items.forEach((item, index) => {
                if (index === currentTrackIndex) {
                    item.classList.add('bg-[rgba(204,255,0,0.1)]', 'border-[var(--neon-green)]');
                    if(item.querySelector('.track-index')) item.querySelector('.track-index').innerHTML = '<i class="fas fa-wave-square animate-pulse text-[var(--neon-green)]"></i>';
                    if(item.querySelector('.track-title')) item.querySelector('.track-title').classList.add('text-[var(--neon-green)]');
                } else {
                    item.classList.remove('bg-[rgba(204,255,0,0.1)]', 'border-[var(--neon-green)]');
                    if(item.querySelector('.track-index')) item.querySelector('.track-index').textContent = index + 1;
                    if(item.querySelector('.track-title')) item.querySelector('.track-title').classList.remove('text-[var(--neon-green)]');
                }
            });
        }

        async function downloadTrack(url, filename) {
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error('Network response was not ok');
                const blob = await response.blob();
                const blobUrl = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = blobUrl;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                window.URL.revokeObjectURL(blobUrl);
            } catch (e) {
                console.error("Download failed, falling back to direct link", e);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                a.target = "_blank";
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            }
        }

        function downloadPlaylist() {
            // Download current playlist tracks
            currentPlaylist.forEach((track, i) => {
                setTimeout(() => {
                    downloadTrack(track.url, `${track.artist} - ${track.title}.mp3`);
                }, i * 1000); // Stagger downloads by 1s to be safe
            });
        }

        // Update renderTrackList to use new download function
        function renderTrackList() {
            if(trackCount) trackCount.textContent = `${currentPlaylist.length} titres`;
            trackList.innerHTML = '';
            
            if (currentPlaylist.length === 0) {
                trackList.innerHTML = `
                    <div class="text-center p-8 text-gray-500">
                        <i class="fas fa-music text-4xl mb-4 opacity-50"></i>
                        <p>Aucun titre trouvé pour cet artiste.</p>
                    </div>
                `;
                return;
            }

            currentPlaylist.forEach((track, index) => {
                const isLiked = likedSongs.includes(track.url);
                const div = document.createElement('div');
                div.className = `track-item flex items-center gap-4 p-3 border border-transparent hover:border-[rgba(204,255,0,0.3)] hover:bg-[rgba(204,255,0,0.05)] transition-all duration-300 group cursor-pointer rounded-lg`;
                div.onclick = (e) => {
                    // Prevent click if clicking heart or download
                    if(e.target.closest('.action-btn')) return;
                    selectTrack(index);
                };
                div.innerHTML = `
                    <span class="track-index font-mono font-bold text-sm w-8 text-center text-gray-500 group-hover:text-[var(--neon-green)] transition-colors">${index + 1}</span>
                    <div class="w-10 h-10 border border-[rgba(204,255,0,0.3)] overflow-hidden relative rounded">
                        <img src="${track.cover}" class="w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-300" alt="Art" onerror="this.src='https://picsum.photos/seed/edit/100'">
                    </div>
                    <div class="flex-1 min-w-0">
                        <h3 class="track-title text-base font-bold text-white group-hover:text-[var(--neon-green)] transition-colors truncate">${track.title}</h3>
                        <p class="text-xs uppercase tracking-widest text-gray-500 group-hover:text-gray-300 transition-colors">${track.artist}</p>
                    </div>
                    <div class="flex items-center gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                        <button class="action-btn w-8 h-8 flex items-center justify-center hover:text-[var(--neon-green)] transition-colors ${isLiked ? 'text-[var(--neon-green)]' : 'text-gray-500'}" onclick="toggleLike('${track.url}', this)">
                            <i class="${isLiked ? 'fas' : 'far'} fa-heart"></i>
                        </button>
                        <button class="action-btn w-8 h-8 border border-[var(--neon-green)] flex items-center justify-center hover:bg-[var(--neon-green)] hover:text-black text-[var(--neon-green)] transition-colors rounded-full" onclick="downloadTrack('${track.url}', '${track.artist} - ${track.title}.mp3')">
                            <i class="fas fa-download text-xs"></i>
                        </button>
                    </div>
                `;
                trackList.appendChild(div);
            });
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('-translate-x-full');
        }

        function closeSidebar() {
            const sidebar = document.getElementById('sidebar');
            // Only close if we are on mobile (check if the class logic applies)
            // But since we are adding the class back, it's safe to just add it.
            // On desktop, the class might be irrelevant if we used md:translate-x-0 correctly.
            // However, to be safe and simple:
            sidebar.classList.add('-translate-x-full');
        }

        // Filtering Logic
        function showLibrary() {
            currentPlaylist = [...allTracks];
            updateHeader("Librairie", "Tous les titres", "./edit.png");
            renderTrackList();
            currentTrackIndex = 0;
            closeSidebar();
        }

        function showLikedSongs() {
            currentPlaylist = allTracks.filter(track => likedSongs.includes(track.url));
            updateHeader("Titres Likés", "Vos coups de cœur", "./edit.png"); // Use a heart image if available or generic
            renderTrackList();
            currentTrackIndex = 0;
            closeSidebar();
        }

        function filterByProject(project) {
            currentPlaylist = allTracks.filter(track => track.project === project || track.artist === project);
            // Fallback for Édits which might be mixed
            if (project === 'Édits') {
                 currentPlaylist = allTracks.filter(track => track.project === 'Édits' || track.artist === 'Édits' || track.artist === 'deprezz' || track.artist === 'Jimmy Sax' || track.artist === 'LONOWN');
            }
            updateHeader(project, "Playlist", `./${project === 'Édits' ? 'edit' : project.toLowerCase()}.png`);
            renderTrackList();
            currentTrackIndex = 0;
            closeSidebar();
        }

        function filterByArtist(artist) {
            currentPlaylist = allTracks.filter(track => track.artist === artist || track.project === artist);
            updateHeader(artist, "Artiste", `./${artist === 'So La Lune' ? 'so' : artist.toLowerCase()}.png`);
            renderTrackList();
            currentTrackIndex = 0;
            closeSidebar();
        }

        function updateHeader(title, subtitle, image) {
            headerTitle.textContent = title.toUpperCase();
            headerSubtitle.textContent = subtitle;
            headerImage.src = image;
            headerImage.onerror = () => headerImage.src = 'https://picsum.photos/seed/music/500';
        }

        function toggleLike(url, btn) {
            if (likedSongs.includes(url)) {
                likedSongs = likedSongs.filter(u => u !== url);
                btn.innerHTML = '<i class="far fa-heart"></i>';
                btn.classList.remove('text-[var(--neon-green)]');
                btn.classList.add('text-gray-500');
            } else {
                likedSongs.push(url);
                btn.innerHTML = '<i class="fas fa-heart"></i>';
                btn.classList.add('text-[var(--neon-green)]');
                btn.classList.remove('text-gray-500');
            }
            localStorage.setItem('likedSongs', JSON.stringify(likedSongs));
            
            // If currently viewing liked songs, refresh list
            if (headerTitle.textContent === "TITRES LIKÉS") {
                showLikedSongs();
            }
        }

        function updateLikeButtonState() {
            // Update the main player heart button if needed
            // For now, we only have the list buttons
        }

        function playAll() {
            if (currentPlaylist.length > 0) {
                currentTrackIndex = 0;
                loadTrack(0);
                playTrack();
            }
        }

        // Start
        init();
    </script>
</body>
</html>
